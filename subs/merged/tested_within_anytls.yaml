mixed-port: 7890
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
geox-url:
  geoip: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
  asn: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - +.msftconnecttest.com
    - +.msftncsi.com
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  respect-rules: true
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    geosite:private,cn,geolocation-cn:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    geosite:google,youtube,telegram,gfw,geolocation-!cn:
      - https://1.1.1.1/dns-query
      - https://1.0.0.1/dns-query
      - https://208.67.222.222/dns-query
      - https://208.67.220.220/dns-query
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - +.push.apple.com
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚑 故障转移
      - DIRECT
      - 🇺🇸 美国-C3404006
      - 🇭🇰 香港-B25F5C85
      - 🇭🇰 香港-7BC094F3
  - name: ♻️ 自动选择
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    lazy: true
    interval: 180
    timeout: 3000
    tolerance: 200
    max-failed-times: 3
    proxies:
      - 🇺🇸 美国-C3404006
      - 🇭🇰 香港-B25F5C85
      - 🇭🇰 香港-7BC094F3
  - name: 🚑 故障转移
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    lazy: true
    interval: 180
    timeout: 3000
    max-failed-times: 3
    proxies:
      - 🇺🇸 美国-C3404006
      - 🇭🇰 香港-B25F5C85
      - 🇭🇰 香港-7BC094F3
  - name: 🎯 全局直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚑 故障转移
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚑 故障转移
      - DIRECT
