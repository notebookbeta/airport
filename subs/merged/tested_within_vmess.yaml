mixed-port: 7890
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
geox-url:
  geoip: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
  asn: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - +.msftconnecttest.com
    - +.msftncsi.com
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  respect-rules: true
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    geosite:private,cn,geolocation-cn:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    geosite:google,youtube,telegram,gfw,geolocation-!cn:
      - https://1.1.1.1/dns-query
      - https://1.0.0.1/dns-query
      - https://208.67.222.222/dns-query
      - https://208.67.220.220/dns-query
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - +.push.apple.com
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚑 故障转移
      - DIRECT
      - 🇨🇦 加拿大-8DAFEF46
      - 🇫🇷 法国-1A55AD4C
      - 🇫🇷 法国-83D3A146
      - 🇩🇪 德国-963F2944
  - name: ♻️ 自动选择
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    lazy: true
    interval: 180
    timeout: 3000
    tolerance: 200
    max-failed-times: 3
    proxies:
      - 🇨🇦 加拿大-8DAFEF46
      - 🇫🇷 法国-1A55AD4C
      - 🇫🇷 法国-83D3A146
      - 🇩🇪 德国-963F2944
  - name: 🚑 故障转移
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    lazy: true
    interval: 180
    timeout: 3000
    max-failed-times: 3
    proxies:
      - 🇨🇦 加拿大-8DAFEF46
      - 🇫🇷 法国-1A55AD4C
      - 🇫🇷 法国-83D3A146
      - 🇩🇪 德国-963F2944
  - name: 🎯 全局直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚑 故障转移
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚑 故障转移
      - DIRECT
proxies:
  - name: 🇨🇦 加拿大-8DAFEF46
    type: vmess
    server: 23.162.200.198
    port: 18000
    alterId: 0
    cipher: auto
    network: tcp
    tls: false
    uuid: f8c8dc3d-0d37-46b0-8b34-a7232882fcfe
  - name: 🇫🇷 法国-1A55AD4C
    type: vmess
    server: 51.195.235.71
    port: 2053
    alpn:
      - h2
      - http/1.1
    alterId: 0
    cipher: auto
    network: tcp
    servername: node-uk.connectsuite.org
    tls: true
    uuid: 39feb812-0fd9-4e89-928b-9ffc0a47b778
  - name: 🇫🇷 法国-83D3A146
    type: vmess
    server: 51.195.203.247
    port: 2053
    alpn:
      - h3
      - h2
      - http/1.1
    alterId: 0
    cipher: auto
    network: tcp
    servername: uk5.taskflowhub.org
    tls: true
    uuid: 89371dfc-2618-40d7-a558-693ff4f7f1eb
  - name: 🇩🇪 德国-963F2944
